# Ubuntu 服务器：Next.js + PostgreSQL + 本地卷存图 + Nginx 反代（无 MinIO）
# 用法：docker compose -f docker-compose.ubuntu.yml up -d --build
# 访问：http://服务器IP  （Nginx → app:3000）

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecommercepic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommercepic_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-ecommercepic}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://ecommercepic:ecommercepic_change_me@db:5432/ecommercepic?schema=public
    image: ecommercepic-app:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ecommercepic}:${POSTGRES_PASSWORD:-ecommercepic_change_me}@db:5432/${POSTGRES_DB:-ecommercepic}?schema=public
      UPLOAD_DIR: /data/uploads
      NODE_ENV: production
      # Worker（MVP 可只配 URL）
      CLOUDFLARE_WORKER_URL: ${CLOUDFLARE_WORKER_URL:-}
      CLOUDFLARE_WORKER_SECRET: ${CLOUDFLARE_WORKER_SECRET:-}
      WORKER_URL: ${WORKER_URL:-}
      WORKER_SECRET: ${WORKER_SECRET:-}
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${UBUNTU_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/ubuntu.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  pgdata:
  uploads:
